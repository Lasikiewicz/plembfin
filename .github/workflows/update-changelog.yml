name: Update Changelog and Version

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: changelog-main
  cancel-in-progress: false

jobs:
  update:
    if: >-
      github.actor != 'github-actions[bot]' &&
      startsWith(github.event.head_commit.message, 'chore: update changelog for ') == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rebase onto current main
        run: git pull --rebase origin main

      - name: Install dependencies
        run: npm ci

      - name: Run build check
        run: npm run build

      - name: Update changelog and version
        id: release
        env:
          SOURCE_COMMIT: ${{ github.sha }}
          SOURCE_MESSAGE: ${{ github.event.head_commit.message }}
          SOURCE_DATE: ${{ github.event.head_commit.timestamp }}
          SOURCE_AUTHOR: ${{ github.event.head_commit.author.name }}
        run: |
          node scripts/update-changelog.js
          echo "version=$(node -p \"require('./changelog.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Commit generated release metadata
        env:
          SOURCE_COMMIT: ${{ github.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add changelog.json package.json package-lock.json
          git commit -m "chore: update changelog for ${SOURCE_COMMIT::7}"
          git push origin main

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.release.outputs.version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
