services:
  plembfin:
    build: .
    image: plembfin:latest
    container_name: plembfin
    ports:
      - "5055:5055"
    volumes:
      # SQLite database, cached artwork, and generated config.json live here.
      - ./data:/data
    environment:
      # Admin login for the dashboard.
      # REQUIRED: set a strong password before first boot — do not leave this commented out.
      - ADMIN_USERNAME=admin
      # - ADMIN_PASSWORD=
      # Set to true when the app is served behind an HTTPS reverse proxy so the
      # session cookie is sent with the Secure flag.
      # - COOKIE_SECURE=true
      # Optional: pin the webhook/integration API key (otherwise auto-generated
      # into data/config.json on first boot).
      # - API_KEY=your-long-random-key
      # Optional: pin the webhook URL secret token (otherwise auto-generated).
      # - WEBHOOK_SECRET=your-long-random-secret
      # Optional: pin the session signing secret (otherwise auto-generated).
      # - SESSION_SECRET=your-long-random-secret
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"
    restart: unless-stopped
